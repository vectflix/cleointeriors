<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CLEO | Gallery & Upload</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://widget.cloudinary.com/v2.0/global/all.js" type="text/javascript"></script>
</head>
<body>
    <header>
        <h1>⚒️ CLEO</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="content.html">Gallery</a>
            <a href="about.html">Contact</a>
        </nav>
    </header>

    <div class="upload-container">
        <h2>Submit Your Inspiration</h2>
        <p>Drag and drop photos of your current space or designs you love.</p>
        
        <div id="upload-widget">
            <h3 style="color: var(--forest-green);">+ Click or Drag Photos Here</h3>
            <p>Supported: JPG, PNG, HEIC</p>
        </div>
    </div>

    <script type="text/javascript">  
        var myWidget = cloudinary.createUploadWidget({
          cloudName: 'demo', // Replace 'demo' with your Cloudinary cloud_name
          uploadPreset: 'ml_default'}, (error, result) => { 
            if (!error && result && result.event === "success") { 
              console.log('Done! Here is the image info: ', result.info); 
              alert("Photo Uploaded Successfully!");
            }
          }
        )

        document.getElementById("upload-widget").addEventListener("click", function(){
            myWidget.open();
          }, false);
    </script>
</body>
</html>
