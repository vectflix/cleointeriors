<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | CLEO INTERIORS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>⚒️ CLEO</h1>
    <nav><a href="index.html">Home</a><a href="content.html">Portfolio</a><a href="about.html">About</a></nav>
</header>

<section class="section">
    <h1 style="text-align: center;">Our Masterpieces</h1>
    <p style="text-align: center; margin-bottom: 50px;">A curated collection of interiors engineered by our expert team.</p>
    
    <div class="grid">
        <div class="portfolio-item">
            <img src="https://res.cloudinary.com/dcssgckgn/image/upload/v1/sample" style="width:100%; height:100%; object-fit:cover;">
            <div style="padding:15px;"><h3>The Modern Loft</h3></div>
        </div>
        <div class="portfolio-item">
            <img src="https://images.unsplash.com/photo-1616489953149-805175402636" style="width:100%; height:100%; object-fit:cover;">
            <div style="padding:15px;"><h3>Industrial Kitchen</h3></div>
        </div>
    </div>
</section>

<section class="section" style="border-top: 1px solid #ddd; margin-top: 100px;">
    <h3>Admin: Upload New Project</h3>
    <script src="https://widget.cloudinary.com/v2.0/global/all.js" type="text/javascript"></script>
    <button id="upload-widget" class="btn" style="background:var(--forest-green); color:white; padding:10px 20px; border:none; cursor:pointer;">Upload Photo to Cloud</button>
    
    <script>
        var myWidget = cloudinary.createUploadWidget({ cloudName: 'dcssgckgn', uploadPreset: 'ml_default' }, (error, result) => { 
            if (!error && result && result.event === "success") { 
                console.log('Image URL:', result.info.secure_url);
                alert("Upload Success! Copy the URL from the console to add it to your HTML code.");
            }
        });
        document.getElementById("upload-widget").addEventListener("click", function(){ myWidget.open(); }, false);
    </script>
</section>

</body>
</html>
