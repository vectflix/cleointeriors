<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | CLEO CORE</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://product-gallery.cloudinary.com/all.js" type="text/javascript"></script>
</head>
<body>

<header>
    <h1>⚒️ CLEO</h1>
    <nav><a href="index.html">HOME</a><a href="content.html">PORTFOLIO</a><a href="about.html">ABOUT</a></nav>
</header>

<section class="section">
    <h2 style="color:var(--orange)">SYSTEM_PORTFOLIO</h2>
    <p>All projects are uploaded and synced via CLEO_CLOUD.</p>
    
    <button class="btn-cyber" id="upload-widget" style="margin-bottom: 50px;">+ ADD NEW PROJECT</button>

    <div id="my-gallery" style="max-width:1200px; margin:auto;"></div>
</section>

<script src="https://widget.cloudinary.com/v2.0/global/all.js" type="text/javascript"></script>
<script>
    // 1. UPLOAD LOGIC
    var myWidget = cloudinary.createUploadWidget({
        cloudName: 'dcssgckgn', 
        uploadPreset: 'ml_default',
        tags: ['cleo_work'] // Photos get this tag automatically
    }, (error, result) => { 
        if (!error && result && result.event === "success") { location.reload(); }
    });
    document.getElementById("upload-widget").addEventListener("click", function(){ myWidget.open(); }, false);

    // 2. DISPLAY LOGIC (Pulls all photos with tag 'cleo_work')
    const myGallery = cloudinary.galleryWidget({
        container: "#my-gallery",
        cloudName: "dcssgckgn",
        mediaAssets: [{ tag: "cleo_work" }], // This pulls your uploaded photos!
        displayProps: { mode: "classic", columns: 2, spacing: 15 },
        aspectRatio: "16:9",
        styleProps: { themeProps: { color: "#FF6600" } }
    });
    myGallery.render();
</script>

</body>
</html>
