<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | CLEO CORE</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://product-gallery.cloudinary.com/all.js" type="text/javascript"></script>
    <script src="https://widget.cloudinary.com/v2.0/global/all.js" type="text/javascript"></script>
</head>
<body>

<header>
    <h1>⚒️ CLEO</h1>
    <nav><a href="index.html">HOME</a><a href="content.html">PORTFOLIO</a><a href="about.html">ABOUT</a></nav>
</header>

<section class="section container">
    <h2 style="color:var(--orange); text-align:center; font-size: 2.5rem;">VAULT_ARCHIVE</h2>
    <p style="text-align:center; color: var(--dim-text); margin-bottom: 40px;">Visual documentation of previous successful deployments.</p>
    
    <div style="text-align:center; margin-bottom:60px;">
        <button onclick="openWidget()" style="background:none; border:2px solid var(--orange); padding:15px 40px; color:var(--orange); font-family:'Orbitron'; cursor:pointer; font-weight:bold;">UPLOAD_DATA_STREAM</button>
    </div>

    <div id="my-gallery" style="width:100%; min-height: 500px;"></div>
</section>

<script>
    function openWidget() {
        cloudinary.openUploadWidget({
            cloudName: 'dcssgckgn',
            uploadPreset: 'ml_default',
            tags: ['cleo_web'] 
        }, (error, result) => {
            if (!error && result.event === "success") { location.reload(); }
        });
    }

    const gallery = cloudinary.galleryWidget({
        container: "#my-gallery",
        cloudName: "dcssgckgn",
        mediaAssets: [{ tag: "cleo_web" }],
        displayProps: { mode: "classic", columns: 2, spacing: 10 },
        styleProps: { themeProps: { color: "#FF6600" } }
    });
    gallery.render();
</script>

</body>
</html>
