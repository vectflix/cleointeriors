<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PORTFOLIO | CLEO CORE</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://product-gallery.cloudinary.com/all.js" type="text/javascript"></script>
    <script src="https://widget.cloudinary.com/v2.0/global/all.js" type="text/javascript"></script>
</head>
<body>

<header>
    <h1>⚒️ CLEO</h1>
    <nav><a href="index.html">HOME</a><a href="content.html">PORTFOLIO</a><a href="about.html">ABOUT</a></nav>
</header>

<section class="section">
    <h2 style="color:var(--orange); text-align:center;">VAULT_GALLERY</h2>
    <div style="text-align:center; margin-bottom:40px;">
        <button onclick="openWidget()" style="background:var(--orange); border:none; padding:15px 30px; color:white; font-family:'Orbitron'; cursor:pointer;">UPLOAD NEW PROJECT</button>
    </div>

    <div id="my-gallery" style="width:100%; max-width:1000px; margin:auto;"></div>
</section>

<script>
    // FIX: This function MUST include the TAG
    function openWidget() {
        cloudinary.openUploadWidget({
            cloudName: 'dcssgckgn',
            uploadPreset: 'ml_default',
            tags: ['cleo_web'] // <--- THIS TAG IS KEY
        }, (error, result) => {
            if (!error && result.event === "success") { 
                alert("Upload Successful! Refreshing gallery...");
                location.reload(); 
            }
        });
    }

    // GALLERY LOGIC
    const gallery = cloudinary.galleryWidget({
        container: "#my-gallery",
        cloudName: "dcssgckgn",
        mediaAssets: [{ tag: "cleo_web" }], // <--- Pulls images with this tag
        displayProps: { mode: "classic", columns: 2 },
        styleProps: { themeProps: { color: "#FF6600" } }
    });
    gallery.render();
</script>

</body>
</html>
